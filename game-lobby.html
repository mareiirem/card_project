<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNO Lobby — Waiting...</title>
    <link rel="stylesheet" href="lobby.css">
</head>

<body>

<header class="navbar">
    <h1 class="logo">UNO Gaming Hub</h1>

    <nav>
        <a href="index.html">Home</a>
        <a href="deck-table.html">Deck Table</a>
        <a href="rules.html">Rules</a>
    </nav>
</header>


<main class="lobby-container fade-in">

    <section class="waiting-panel">
        <h2>Waiting for Players...</h2>

        <div class="timer">
            <p>Estimated Match Start</p>
            <span>00:30</span>
        </div>

        <button class="primary-btn">Join Random UNO Match</button>
    </section>


    <section class="lobbies">
        <h3>Available UNO Lobbies</h3>

        <div class="lobby-card red">
            <div>
                <p>Classic UNO Room</p>
                <span>Players: 2/4</span>
            </div>
            <button>Join</button>
        </div>

        <div class="lobby-card blue">
            <div>
                <p>Fast Play Mode</p>
                <span>Players: 3/4</span>
            </div>
            <button>Join</button>
        </div>

        <div class="lobby-card green">
            <div>
                <p>Strategy Table</p>
                <span>Players: 1/4</span>
            </div>
            <button>Join</button>
        </div>
    </section>


    <section class="friends">
        <h3>Friends Online</h3>

        <ul>
            <li>Player 1 — Ready <button>Invite</button></li>
            <li>Player 2 — In Match <button>Watch</button></li>
            <li>Player 3 — Available <button>Invite</button></li>
        </ul>
    </section>

</main>

</body>
</html>
