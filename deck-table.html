<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>UNO Deck Table</title>
    <link rel="stylesheet" href="deck-table.css">
</head>
<body>

<header class="navbar">
    <h1 class="logo">UNO Gaming Hub</h1>
    <nav>
        <a href="index.html">Home</a>
        <a href="game-lobby.html">Lobby</a>
        <a href="rules.html">Rules</a>
    </nav>
</header>

<main class="table-container fade-in">

<!-- DRAW PILE -->
<section class="deck-area">
    <h2>Draw Pile</h2>

    <div class="discard-stack">

        <!-- bottom cards  -->
        <div class="card back1">
            <img src="Assets/Uno_back.png" class="draw-front-img" alt="UNO Back">
        </div>

        <div class="card back2">
            <img src="Assets/Uno_back.png" class="draw-front-img" alt="UNO Back">
        </div>

        <!-- top card -->
        <div class="card flippable top-draw">
            <div class="card-inner">
                
                <!-- bottom cards  -->
                <div class="card-front draw-front">
                    <img src="Assets/Uno_back.png" class="draw-front-img" alt="UNO Back">
                </div>

                <!-- BACK -->
                <div class="card-back">
                    <img src="Assets/Green-Reverse-1.png" class="discard-back-img" alt="Green reverse">
                </div>

            </div>
        </div>

    </div>
</section>


<!-- DISCARD PILE -->
<section class="deck-area">
    <h2>Discard Pile</h2>

    <div class="discard-stack">

        <!-- bottom cards -->
        <div class="card back1">
            <img src="Assets/Blue-12.png" class="discard-back-img" alt="UNO Back">
        </div>

        <div class="card back2">
            <img src="Assets/Wild-3.png" class="discard-back-img" alt="UNO Back">
        </div>

        <!-- top card with flip -->
        <div class="card flippable top-discard">
            <div class="card-inner">
                
                <!-- FRONT -->
                <div class="card-front discard-front">
                    <img src="Assets/Red-5.png" class="discard-front-img" alt="Red 5">
                </div>

                <!-- BACK -->
                <div class="card-back">
                    <img src="Assets/Uno_back.png" class="discard-back-img" alt="UNO Back">
                </div>

            </div>
        </div>

    </div>

</section>

<div class="player-area">

    <!-- TURN INDICATOR -->
    <aside class="turn-indicator">
        <h2>Turn Info</h2>
        <div class="turn-counter">Turn: <strong>5</strong></div>
        <ul class="player-list">
            <li class="active">Player 1 — 3 cards</li>
            <li>Player 2 — 5 cards</li>
            <li>Player 3 — 2 cards</li>
            <li>Player 4 — 4 cards</li>
        </ul>
        <div class="additional-info">
            Direction: <strong>Clockwise</strong><br>
        </div>
    </aside>

    <!-- PLAYER HAND -->
    <section class="player-hand">
        <h2>Your Hand</h2>

        <div class="hand">

            <!-- Red Draw 2 -->
            <div class="card red">
                <img src="Assets/plus_2.png" class="corner top-left" alt="plus 2">
                <img src="Assets/regular_2cards.png" class="center-symbol" alt="two stacked cards">
                <img src="Assets/plus_2.png" class="corner bottom-right" alt="plus 2">
            </div>

            <!-- Blue Reverse -->
            <div class="card blue">
                <img src="Assets/reverse.png" class="corner top-left" alt="reverse symbol">
                <img src="Assets/reverse.png" class="center-symbol" alt="reverse symbol">
                <img src="Assets/reverse.png" class="corner bottom-right" alt="reverse symbol">
            </div>

            <!-- Green Skip -->
            <div class="card green">
                <img src="Assets/skip.png" class="corner top-left" alt="skip symbol">
                <img src="Assets/skip.png" class="center-symbol" alt="skip symbol">
                <img src="Assets/skip.png" class="corner bottom-right" alt="skip symbol">
            </div>

            <!-- Yellow +4 -->
            <div class="card black">
                <img src="Assets/plus_4.png" class="corner plus4-corner top-left" alt="plus 4">
                <img src="Assets/colorful_4cards.png" class="center-symbol" alt="4 stacked colorful cards">
                <img src="Assets/plus_4.png" class="corner plus4-corner bottom-right" alt="plus 4">
            </div>

            <!-- Wild -->
            <div class="card black wild">
                <img src="Assets/wild_symbol.png" class="corner top-left" alt="wild symbol">
                <img src="Assets/wild_words_symbol.png" class="center-symbol wild-center" alt="wild spelled out">
                <img src="Assets/wild_symbol.png" class="corner bottom-right" alt="wild symbol">
            </div>
        </div>
    </section>
</div>
</main>

</body>
</html>
